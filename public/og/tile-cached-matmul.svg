<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="10" height="630" fill="#14b8a6"/>

  <!-- category chip -->
  <rect x="80" y="74" width="184" height="44" rx="22" fill="#14b8a6"/>
  <text x="172" y="103" text-anchor="middle" font-size="21" font-weight="700" fill="#04201c">GPU / CUDA</text>

  <!-- title -->
  <text x="80" y="222" font-size="62" font-weight="800" fill="#f8fafc">Tiled Matrix</text>
  <text x="80" y="292" font-size="62" font-weight="800" fill="#f8fafc">Multiplication</text>
  <text x="80" y="362" font-size="62" font-weight="800" fill="#f8fafc">in CUDA</text>

  <!-- subtitle -->
  <text x="82" y="418" font-size="27" fill="#cbd5e1">Why a tiny on-chip cache beats brute force.</text>

  <!-- footer -->
  <line x1="82" y1="520" x2="540" y2="520" stroke="#334155" stroke-width="2"/>
  <text x="82" y="560" font-size="23" font-weight="700" fill="#e2e8f0">Koushik Maji</text>
  <text x="82" y="588" font-size="20" fill="#94a3b8">Part 1 of 3 &#183; Hardware-aware algorithms</text>

  <!-- ===== pyramid motif (apex 980,150 -> base 830/1130,470) ===== -->
  <!-- Registers -->
  <polygon points="980,150 1017,230 943,230" fill="#f59e0b"/>
  <!-- SRAM -->
  <polygon points="942,232 1018,232 1055,310 905,310" fill="#14b8a6"/>
  <text x="980" y="277" text-anchor="middle" font-size="17" font-weight="700" fill="#04201c">SRAM</text>
  <!-- L2 -->
  <polygon points="904,312 1056,312 1093,390 867,390" fill="#3b82f6"/>
  <text x="980" y="357" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">L2</text>
  <!-- HBM -->
  <polygon points="866,392 1094,392 1130,470 830,470" fill="#6366f1"/>
  <text x="980" y="437" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">HBM</text>

  <text x="980" y="505" text-anchor="middle" font-size="19" fill="#94a3b8">GPU memory hierarchy</text>
</svg>
