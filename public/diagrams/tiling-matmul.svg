<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 660" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="820" height="660" rx="16" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="819" height="659" rx="16" fill="none" stroke="#e2e8f0"/>

  <!-- Title -->
  <text x="410" y="58" text-anchor="middle" font-size="30" font-weight="800" fill="#0f172a">C = A &#215; B</text>

  <!-- ====== Matrix A (left), rows align with C ====== -->
  <text x="160" y="372" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Matrix A (M &#215; K)</text>
  <g stroke="#94a3b8" stroke-width="1.2" fill="#ffffff">
    <rect x="70" y="390" width="180" height="180"/>
    <line x1="100" y1="390" x2="100" y2="570"/><line x1="130" y1="390" x2="130" y2="570"/>
    <line x1="160" y1="390" x2="160" y2="570"/><line x1="190" y1="390" x2="190" y2="570"/>
    <line x1="220" y1="390" x2="220" y2="570"/>
    <line x1="70" y1="420" x2="250" y2="420"/><line x1="70" y1="450" x2="250" y2="450"/>
    <line x1="70" y1="480" x2="250" y2="480"/><line x1="70" y1="510" x2="250" y2="510"/>
    <line x1="70" y1="540" x2="250" y2="540"/>
  </g>
  <!-- tile A (row i) -->
  <rect x="190" y="480" width="30" height="30" fill="#f59e0b"/>
  <text x="205" y="500" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" dy="0.05em">A</text>
  <text x="58" y="500" text-anchor="end" font-size="13" font-weight="600" fill="#475569">Row i</text>

  <!-- dashed "walk across K" arrow inside A -->
  <line x1="160" y1="495" x2="186" y2="495" stroke="#0f766e" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="190,495 182,491 182,499" fill="#0f766e"/>

  <!-- ====== Matrix B (top right), cols align with C ====== -->
  <text x="650" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Matrix B (K &#215; N)</text>
  <g stroke="#94a3b8" stroke-width="1.2" fill="#ffffff">
    <rect x="560" y="150" width="180" height="180"/>
    <line x1="590" y1="150" x2="590" y2="330"/><line x1="620" y1="150" x2="620" y2="330"/>
    <line x1="650" y1="150" x2="650" y2="330"/><line x1="680" y1="150" x2="680" y2="330"/>
    <line x1="710" y1="150" x2="710" y2="330"/>
    <line x1="560" y1="180" x2="740" y2="180"/><line x1="560" y1="210" x2="740" y2="210"/>
    <line x1="560" y1="240" x2="740" y2="240"/><line x1="560" y1="270" x2="740" y2="270"/>
    <line x1="560" y1="300" x2="740" y2="300"/>
  </g>
  <!-- tile B (col j) -->
  <rect x="620" y="240" width="30" height="30" fill="#f59e0b"/>
  <text x="635" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" dy="0.05em">B</text>
  <text x="635" y="146" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Col j</text>

  <!-- ====== Matrix C (bottom right) ====== -->
  <g stroke="#94a3b8" stroke-width="1.2" fill="#ffffff">
    <rect x="560" y="390" width="180" height="180"/>
    <line x1="590" y1="390" x2="590" y2="570"/><line x1="620" y1="390" x2="620" y2="570"/>
    <line x1="650" y1="390" x2="650" y2="570"/><line x1="680" y1="390" x2="680" y2="570"/>
    <line x1="710" y1="390" x2="710" y2="570"/>
    <line x1="560" y1="420" x2="740" y2="420"/><line x1="560" y1="450" x2="740" y2="450"/>
    <line x1="560" y1="480" x2="740" y2="480"/><line x1="560" y1="510" x2="740" y2="510"/>
    <line x1="560" y1="540" x2="740" y2="540"/>
  </g>
  <text x="650" y="592" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Output Matrix C (M &#215; N)</text>
  <!-- tile C (row i, col j) -->
  <rect x="620" y="480" width="30" height="30" fill="#14b8a6"/>
  <!-- sigma badge -->
  <circle cx="635" cy="495" r="11" fill="#ffffff" stroke="#0f766e" stroke-width="1.5"/>
  <text x="635" y="500" text-anchor="middle" font-size="13" font-weight="700" fill="#0f766e">&#931;</text>

  <!-- Arrow A tile -> C tile (horizontal, row i) -->
  <line x1="222" y1="495" x2="616" y2="495" stroke="#1e293b" stroke-width="2.5"/>
  <polygon points="620,495 610,490 610,500" fill="#1e293b"/>

  <!-- Arrow B tile -> C tile (vertical, col j) -->
  <line x1="635" y1="272" x2="635" y2="476" stroke="#1e293b" stroke-width="2.5"/>
  <polygon points="635,480 630,470 640,470" fill="#1e293b"/>

  <!-- accumulate equation caption -->
  <text x="660" y="540" font-size="13.5" font-weight="600" fill="#0f766e">C += A &#215; B</text>

  <!-- loop-K caption -->
  <text x="150" y="610" text-anchor="middle" font-size="13" fill="#0f766e">Loop over K:</text>
  <text x="150" y="628" text-anchor="middle" font-size="13" fill="#0f766e">walk one tile at a time &#8594;</text>
</svg>
