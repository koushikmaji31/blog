<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 780" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="redArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e53935"/>
    </marker>
  </defs>

  <style>
    .gA   { stroke:#2e7d32; stroke-width:2; }
    .gB   { stroke:#f57c00; stroke-width:2; }
    .gC   { stroke:#1565c0; stroke-width:2; }
    .fA   { fill:#e8f5e9; }
    .fB   { fill:#fff3e0; }
    .fC   { fill:#e3f2fd; }
    .actA { fill:#c8e6c9; }
    .actB { fill:#ffe0b2; }
    .cellA{ fill:#2e7d32; stroke:#000; stroke-width:2.5; }
    .cellB{ fill:#ef6c00; stroke:#000; stroke-width:2.5; }
    .cellC{ fill:#1565c0; stroke:#0d47a1; stroke-width:2.5; }
    .ct   { fill:#fff; font-size:15px; font-weight:700; text-anchor:middle; }
    .loop { fill:#e53935; font-size:18px; font-weight:700; }
    .tA   { fill:#1b5e20; font-size:18px; font-weight:700; text-anchor:middle; }
    .tB   { fill:#e65100; font-size:18px; font-weight:700; text-anchor:middle; }
    .tC   { fill:#0d47a1; font-size:18px; font-weight:700; text-anchor:middle; }
    .dash { stroke:#9e9e9e; stroke-width:2; stroke-dasharray:6 6; fill:none; }
  </style>

  <!-- ===================== MATRIX B (top-right) ===================== -->
  <!-- light fill background -->
  <rect class="fB" x="405" y="85" width="300" height="300"/>
  <!-- active column (col index 2: x=555..630) -->
  <rect class="actB" x="555" y="85" width="75" height="300"/>
  <!-- grid lines -->
  <g class="gB" fill="none">
    <rect x="405" y="85" width="300" height="300"/>
    <line x1="480" y1="85" x2="480" y2="385"/>
    <line x1="555" y1="85" x2="555" y2="385"/>
    <line x1="630" y1="85" x2="630" y2="385"/>
    <line x1="405" y1="160" x2="705" y2="160"/>
    <line x1="405" y1="235" x2="705" y2="235"/>
    <line x1="405" y1="310" x2="705" y2="310"/>
  </g>
  <!-- B(k) active cell: col2,row1 (y=160..235) -->
  <rect class="cellB" x="555" y="160" width="75" height="75"/>
  <text class="ct" x="592" y="192">B</text>
  <text class="ct" x="592" y="209">(k)</text>
  <!-- Loop K vertical arrow -->
  <line x1="540" y1="95" x2="540" y2="392" stroke="#e53935" stroke-width="3" marker-end="url(#redArrow)"/>
  <text class="loop" x="528" y="245" transform="rotate(-90 528 245)" text-anchor="middle">Loop K</text>
  <!-- label -->
  <text class="tB" x="555" y="45">Matrix B (K×N)</text>
  <text class="tB" x="555" y="68">Active Col</text>

  <!-- ===================== MATRIX A (bottom-left) ===================== -->
  <rect class="fA" x="75" y="405" width="300" height="300"/>
  <!-- active row (row index 1: y=480..555) -->
  <rect class="actA" x="75" y="480" width="300" height="75"/>
  <g class="gA" fill="none">
    <rect x="75" y="405" width="300" height="300"/>
    <line x1="150" y1="405" x2="150" y2="705"/>
    <line x1="225" y1="405" x2="225" y2="705"/>
    <line x1="300" y1="405" x2="300" y2="705"/>
    <line x1="75" y1="480" x2="375" y2="480"/>
    <line x1="75" y1="555" x2="375" y2="555"/>
    <line x1="75" y1="630" x2="375" y2="630"/>
  </g>
  <!-- A(k) active cell: col1,row1 (x=150..225, y=480..555) -->
  <rect class="cellA" x="150" y="480" width="75" height="75"/>
  <text class="ct" x="187" y="512">A</text>
  <text class="ct" x="187" y="529">(k)</text>
  <!-- Loop K horizontal arrow -->
  <line x1="88" y1="465" x2="390" y2="465" stroke="#e53935" stroke-width="3" marker-end="url(#redArrow)"/>
  <text class="loop" x="225" y="455" text-anchor="middle">Loop K</text>
  <!-- label -->
  <text class="tA" x="225" y="740">Matrix A (M×K)</text>
  <text class="tA" x="225" y="763">Active Row</text>

  <!-- ===================== MATRIX C (bottom-right) ===================== -->
  <rect class="fC" x="405" y="405" width="300" height="300"/>
  <g class="gC" fill="none">
    <rect x="405" y="405" width="300" height="300"/>
    <line x1="480" y1="405" x2="480" y2="705"/>
    <line x1="555" y1="405" x2="555" y2="705"/>
    <line x1="630" y1="405" x2="630" y2="705"/>
    <line x1="405" y1="480" x2="705" y2="480"/>
    <line x1="405" y1="555" x2="705" y2="555"/>
    <line x1="405" y1="630" x2="705" y2="630"/>
  </g>
  <!-- C target tile: col2,row1 (x=555..630, y=480..555) -->
  <rect class="cellC" x="555" y="480" width="75" height="75"/>
  <text class="ct" x="592" y="512">C</text>
  <text class="ct" x="592" y="529">Tile</text>
  <!-- label -->
  <text class="tC" x="555" y="740">Matrix C (M×N)</text>
  <text class="tC" x="555" y="763">Target Tile</text>

  <!-- ===================== projection dashes ===================== -->
  <!-- A(k) row -> C tile (horizontal) -->
  <path class="dash" d="M225 517 L555 517"/>
  <!-- B(k) col -> C tile (vertical) -->
  <path class="dash" d="M592 235 L592 480"/>
</svg>
