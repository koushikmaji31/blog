<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Caveat','Comic Sans MS','Comic Neue',cursive">
  <defs>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e8822c"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2f7fd1"/>
    </marker>
  </defs>

  <style>
    .grid   { stroke:#2b2b2b; stroke-width:2; stroke-linecap:round; }
    .gridT  { stroke:#2b2b2b; stroke-width:3.5; stroke-linecap:round; }
    .green  { fill:none; stroke:#34a853; stroke-width:3; }
    .orange { fill:none; stroke:#e8822c; stroke-width:3.5; }
    .blue   { fill:none; stroke:#2f7fd1; stroke-width:3.5; }
    .lbl    { font-size:26px; fill:#2b2b2b; }
    .op     { font-size:30px; fill:#2b2b2b; }
    .tO     { font-size:24px; fill:#e8822c; }
    .tB     { font-size:24px; fill:#2f7fd1; }
  </style>

  <!-- ================= TOP ROW : thread 1 (orange) ================= -->

  <!-- Matrix A (top) grid, origin 60,50 size140 cell35 -->
  <g class="grid">
    <line x1="60" y1="50" x2="60" y2="190"/><line x1="95" y1="50" x2="95" y2="190"/>
    <line x1="130" y1="50" x2="130" y2="190"/><line x1="165" y1="50" x2="165" y2="190"/>
    <line x1="200" y1="50" x2="200" y2="190"/>
    <line x1="60" y1="50" x2="200" y2="50"/><line x1="60" y1="85" x2="200" y2="85"/>
    <line x1="60" y1="120" x2="200" y2="120"/><line x1="60" y1="155" x2="200" y2="155"/>
    <line x1="60" y1="190" x2="200" y2="190"/>
  </g>
  <rect class="orange" x="52" y="42" width="86" height="156" rx="12"/>
  <rect class="green" x="66" y="56" width="22" height="128" rx="9"/>
  <rect class="green" x="101" y="56" width="22" height="128" rx="9"/>
  <text class="lbl" x="124" y="216" text-anchor="middle">A</text>

  <text class="op" x="258" y="130" text-anchor="middle">@</text>

  <!-- Matrix B (top) grid, origin 320,50 -->
  <g class="grid">
    <line x1="320" y1="50" x2="320" y2="190"/><line x1="355" y1="50" x2="355" y2="190"/>
    <line x1="390" y1="50" x2="390" y2="190"/><line x1="425" y1="50" x2="425" y2="190"/>
    <line x1="460" y1="50" x2="460" y2="190"/>
    <line x1="320" y1="50" x2="460" y2="50"/><line x1="320" y1="85" x2="460" y2="85"/>
    <line x1="320" y1="120" x2="460" y2="120"/><line x1="320" y1="155" x2="460" y2="155"/>
    <line x1="320" y1="190" x2="460" y2="190"/>
  </g>
  <rect class="orange" x="312" y="42" width="156" height="86" rx="12"/>
  <rect class="green" x="326" y="56" width="128" height="22" rx="9"/>
  <rect class="green" x="326" y="91" width="128" height="22" rx="9"/>
  <text class="lbl" x="390" y="216" text-anchor="middle">B</text>

  <!-- orange arrow B(top) -> C top-left tile -->
  <path d="M472 96 Q610 110 724 198" fill="none" stroke="#e8822c" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text class="tO" x="556" y="118">thread 1</text>

  <!-- ================= dots between the two examples ================= -->
  <text class="op" x="390" y="282" text-anchor="middle">...</text>

  <!-- ================= MATRIX C (right) ================= -->
  <g class="grid">
    <line x1="740" y1="170" x2="740" y2="330"/><line x1="780" y1="170" x2="780" y2="330"/>
    <line x1="860" y1="170" x2="860" y2="330"/><line x1="900" y1="170" x2="900" y2="330"/>
    <line x1="740" y1="170" x2="900" y2="170"/><line x1="740" y1="210" x2="900" y2="210"/>
    <line x1="740" y1="290" x2="900" y2="290"/><line x1="740" y1="330" x2="900" y2="330"/>
  </g>
  <g class="gridT">
    <line x1="820" y1="170" x2="820" y2="330"/><line x1="740" y1="250" x2="900" y2="250"/>
  </g>
  <rect class="orange" x="732" y="162" width="96" height="96" rx="12"/>
  <rect class="blue" x="812" y="242" width="96" height="96" rx="12"/>
  <text class="lbl" x="820" y="152" text-anchor="middle">C</text>

  <!-- ================= BOTTOM ROW : thread 4 (blue) ================= -->

  <!-- Matrix A (bottom) grid, origin 60,360 -->
  <g class="grid">
    <line x1="60" y1="360" x2="60" y2="500"/><line x1="95" y1="360" x2="95" y2="500"/>
    <line x1="130" y1="360" x2="130" y2="500"/><line x1="165" y1="360" x2="165" y2="500"/>
    <line x1="200" y1="360" x2="200" y2="500"/>
    <line x1="60" y1="360" x2="200" y2="360"/><line x1="60" y1="395" x2="200" y2="395"/>
    <line x1="60" y1="430" x2="200" y2="430"/><line x1="60" y1="465" x2="200" y2="465"/>
    <line x1="60" y1="500" x2="200" y2="500"/>
  </g>
  <rect class="blue" x="122" y="352" width="86" height="156" rx="12"/>
  <rect class="green" x="136" y="366" width="22" height="128" rx="9"/>
  <rect class="green" x="171" y="366" width="22" height="128" rx="9"/>
  <text class="lbl" x="124" y="526" text-anchor="middle">A</text>

  <text class="op" x="258" y="440" text-anchor="middle">@</text>

  <!-- Matrix B (bottom) grid, origin 320,360 -->
  <g class="grid">
    <line x1="320" y1="360" x2="320" y2="500"/><line x1="355" y1="360" x2="355" y2="500"/>
    <line x1="390" y1="360" x2="390" y2="500"/><line x1="425" y1="360" x2="425" y2="500"/>
    <line x1="460" y1="360" x2="460" y2="500"/>
    <line x1="320" y1="360" x2="460" y2="360"/><line x1="320" y1="395" x2="460" y2="395"/>
    <line x1="320" y1="430" x2="460" y2="430"/><line x1="320" y1="465" x2="460" y2="465"/>
    <line x1="320" y1="500" x2="460" y2="500"/>
  </g>
  <rect class="blue" x="312" y="422" width="156" height="86" rx="12"/>
  <rect class="green" x="326" y="436" width="128" height="22" rx="9"/>
  <rect class="green" x="326" y="471" width="128" height="22" rx="9"/>
  <text class="lbl" x="390" y="526" text-anchor="middle">B</text>

  <!-- blue arrow B(bottom) -> C bottom-right tile -->
  <path d="M472 466 Q660 470 806 304" fill="none" stroke="#2f7fd1" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text class="tB" x="556" y="500">thread 4</text>
</svg>
