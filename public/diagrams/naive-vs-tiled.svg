<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect x="0" y="0" width="900" height="540" rx="16" fill="#f8fafc"/>
  <rect x="0.5" y="0.5" width="899" height="539" rx="16" fill="none" stroke="#e2e8f0"/>

  <line x1="450" y1="40" x2="450" y2="500" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ============ LEFT: NAIVE ============ -->
  <text x="225" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#b91c1c">NAÏVE</text>
  <text x="225" y="78" text-anchor="middle" font-size="13" fill="#64748b">every thread re-reads HBM directly</text>

  <!-- threads -->
  <g>
    <rect x="70"  y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="135" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="200" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="265" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="330" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <text x="220" y="100" text-anchor="middle" font-size="12" fill="#64748b">threads</text>
  </g>

  <!-- tangled red reads -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.55" fill="none">
    <line x1="90"  y1="144" x2="150" y2="400"/>
    <line x1="90"  y1="144" x2="300" y2="400"/>
    <line x1="155" y1="144" x2="120" y2="400"/>
    <line x1="155" y1="144" x2="330" y2="400"/>
    <line x1="220" y1="144" x2="180" y2="400"/>
    <line x1="220" y1="144" x2="350" y2="400"/>
    <line x1="285" y1="144" x2="140" y2="400"/>
    <line x1="285" y1="144" x2="280" y2="400"/>
    <line x1="350" y1="144" x2="200" y2="400"/>
    <line x1="350" y1="144" x2="330" y2="400"/>
  </g>

  <!-- HBM block -->
  <rect x="70" y="400" width="300" height="58" rx="8" fill="#6366f1"/>
  <text x="220" y="435" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">HBM (global memory)</text>

  <text x="225" y="488" text-anchor="middle" font-size="12.5" fill="#b91c1c">redundant traffic — neighbors fetch the same bytes</text>

  <!-- ============ RIGHT: TILED ============ -->
  <text x="675" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#0f766e">TILED</text>
  <text x="675" y="78" text-anchor="middle" font-size="13" fill="#64748b">load a tile once, then reuse it many times</text>

  <!-- threads -->
  <g>
    <rect x="520" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="585" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="650" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="715" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <rect x="780" y="110" width="40" height="34" rx="6" fill="#fde68a" stroke="#f59e0b"/>
    <text x="670" y="100" text-anchor="middle" font-size="12" fill="#64748b">threads</text>
  </g>

  <!-- green reuse arrows: shared mem -> threads -->
  <g stroke="#22c55e" stroke-width="2" fill="#22c55e">
    <line x1="540" y1="265" x2="540" y2="150"/><polygon points="540,142 535,154 545,154"/>
    <line x1="605" y1="265" x2="605" y2="150"/><polygon points="605,142 600,154 610,154"/>
    <line x1="670" y1="265" x2="670" y2="150"/><polygon points="670,142 665,154 675,154"/>
    <line x1="735" y1="265" x2="735" y2="150"/><polygon points="735,142 730,154 745,154"/>
    <line x1="800" y1="265" x2="800" y2="150"/><polygon points="800,142 795,154 805,154"/>
  </g>
  <text x="845" y="210" font-size="12" fill="#16a34a" text-anchor="middle">reuse</text>

  <!-- Shared memory block -->
  <rect x="520" y="268" width="300" height="56" rx="8" fill="#14b8a6"/>
  <text x="670" y="302" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Shared Memory (SRAM)</text>

  <!-- one blue load arrow: HBM -> shared mem -->
  <line x1="670" y1="400" x2="670" y2="330" stroke="#2563eb" stroke-width="4" />
  <polygon points="670,320 663,336 677,336" fill="#2563eb"/>
  <text x="690" y="370" font-size="12" font-weight="600" fill="#2563eb">load tile once</text>

  <!-- HBM block -->
  <rect x="520" y="400" width="300" height="58" rx="8" fill="#6366f1"/>
  <text x="670" y="435" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">HBM (global memory)</text>

  <text x="675" y="488" text-anchor="middle" font-size="12.5" fill="#0f766e">HBM traffic drops by a factor of TILE</text>
</svg>
